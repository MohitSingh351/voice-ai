{% extends "base.html" %}
{% block title %}Sign in · Voice AI{% endblock %}
{% block auth_content %}
<div class="panel" style="margin-bottom:0">
    <div class="brand" style="padding:0 0 18px; gap:11px;">
        <span class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="17" height="17"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg>
        </span>
        <span style="font-size:17px; font-weight:700;">Voice AI</span>
    </div>
    <h1 style="font-size:20px;">Sign in</h1>
    <p class="subtitle" style="margin-bottom:20px;">Manage your AI calling campaigns.</p>
    <form method="post">
        {% csrf_token %}
        {% if form.errors %}<ul class="messages"><li class="error">Invalid username or password.</li></ul>{% endif %}
        <div class="field">
            <label>Username</label>
            {{ form.username }}
        </div>
        <div class="field">
            <label>Password</label>
            {{ form.password }}
        </div>
        <button type="submit" style="margin-top:6px; width:100%;">Sign in</button>
    </form>
</div>
{% endblock %}
